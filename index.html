<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FX Convert – Currency Converter</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg: #060c18;
      --card: rgba(13,20,38,0.92);
      --border: rgba(255,255,255,0.07);
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --text: #f1f5f9;
      --muted: #64748b;
      --success: #10b981;
    }

    body {
      font-family: -apple-system,'Segoe UI',sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── ANIMATED BG ── */
    .bg-blob { position:fixed; border-radius:50%; pointer-events:none; filter:blur(100px); }
    .blob-1 { width:600px;height:600px;background:rgba(59,130,246,.09);top:-200px;left:-150px;animation:blobMove 12s ease-in-out infinite; }
    .blob-2 { width:500px;height:500px;background:rgba(139,92,246,.07);bottom:-200px;right:-100px;animation:blobMove 10s ease-in-out infinite reverse; }
    .blob-3 { width:300px;height:300px;background:rgba(16,185,129,.05);top:50%;left:50%;transform:translate(-50%,-50%);animation:blobMove 8s ease-in-out infinite; }
    @keyframes blobMove { 0%,100%{transform:translate(0,0)} 33%{transform:translate(30px,-20px)} 66%{transform:translate(-20px,30px)} }
    .blob-1,.blob-2 { animation-name:blobMove; }

    /* ── TICKER ── */
    .ticker-wrap { background:rgba(13,20,38,.95);border-bottom:1px solid var(--border);padding:10px 0;overflow:hidden; }
    .ticker-track { display:flex;animation:ticker 30s linear infinite;white-space:nowrap;width:max-content; }
    .ticker-track:hover { animation-play-state:paused; }
    @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    .ticker-item { display:inline-flex;align-items:center;gap:8px;padding:0 28px;font-size:12px;font-weight:600;color:var(--muted);border-right:1px solid var(--border); }
    .ticker-pair { color:var(--text); }
    .ticker-rate { color:var(--blue); }
    .ticker-up   { color:var(--success);font-size:10px; }
    .ticker-down { color:#ef4444;font-size:10px; }

    /* ── LAYOUT ── */
    .page { max-width:1100px;margin:0 auto;padding:40px 24px 80px;position:relative;z-index:1; }
    .page-header { text-align:center;margin-bottom:48px; }
    .page-title { font-size:clamp(32px,5vw,52px);font-weight:900;letter-spacing:-1.5px;margin-bottom:8px; }
    .page-title span { background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
    .page-sub { font-size:14px;color:var(--muted); }

    /* ── MAIN GRID ── */
    .main-grid { display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start; }

    /* ── CONVERTER CARD ── */
    .converter-card {
      background:var(--card);border:1px solid var(--border);border-radius:28px;
      padding:36px;backdrop-filter:blur(24px);
      box-shadow:0 32px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);
    }

    .card-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:28px; }
    .brand { display:flex;align-items:center;gap:10px; }
    .brand-icon { width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(59,130,246,.4); }
    .brand-name { font-size:18px;font-weight:800; }
    .live-badge { display:flex;align-items:center;gap:6px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:var(--success);font-size:10px;font-weight:700;letter-spacing:1px;padding:5px 12px;border-radius:20px; }
    .live-dot { width:6px;height:6px;border-radius:50%;background:var(--success);animation:livePulse 2s infinite; }
    @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.3)} }

    .pairs { display:flex;gap:7px;flex-wrap:wrap;margin-bottom:28px; }
    .pair-btn { background:rgba(30,41,59,.7);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:600;padding:6px 13px;border-radius:20px;cursor:pointer;font-family:inherit;transition:all .2s; }
    .pair-btn:hover,.pair-btn.active { background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.4);color:#93c5fd; }

    .panels { display:grid;grid-template-columns:1fr 56px 1fr;gap:12px;align-items:center;margin-bottom:20px; }
    .panel { background:rgba(30,41,59,.55);border:1.5px solid var(--border);border-radius:20px;padding:20px;transition:border-color .25s; }
    .panel:focus-within { border-color:rgba(59,130,246,.5);box-shadow:0 0 20px rgba(59,130,246,.1); }
    .panel-label { font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px; }
    .currency-row { display:flex;align-items:center;gap:8px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid rgba(255,255,255,.05); }
    .flag { font-size:22px;flex-shrink:0; }
    select { background:transparent;border:none;color:var(--text);font-size:14px;font-weight:700;font-family:inherit;outline:none;cursor:pointer;appearance:none;flex:1; }
    select option { background:#1e293b;color:var(--text); }
    .amount-input { width:100%;background:transparent;border:none;color:var(--text);font-size:32px;font-weight:900;font-family:inherit;outline:none;-moz-appearance:textfield; }
    .amount-input::-webkit-outer-spin-button,.amount-input::-webkit-inner-spin-button { -webkit-appearance:none; }
    .amount-input::placeholder { color:#1e293b; }
    .result-num { font-size:32px;font-weight:900;color:var(--blue);min-height:40px;transition:all .3s;word-break:break-all; }
    .result-num.updating { opacity:.3;transform:scale(.97); }

    .swap-col { display:flex;flex-direction:column;align-items:center; }
    .swap-btn { width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(59,130,246,.45);transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .2s; }
    .swap-btn:hover { transform:rotate(180deg);box-shadow:0 8px 36px rgba(59,130,246,.65); }

    .rate-info { background:rgba(30,41,59,.5);border:1px solid var(--border);border-radius:16px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px; }
    .rate-main { font-size:13px;color:var(--muted); }
    .rate-main strong { color:var(--text); }
    .rate-badge { font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--blue); }

    .copy-btn { width:100%;padding:13px;border-radius:14px;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));color:white;border:none;cursor:pointer;font-family:inherit;box-shadow:0 4px 24px rgba(59,130,246,.35);transition:all .2s; }
    .copy-btn:hover { transform:translateY(-2px);box-shadow:0 8px 36px rgba(59,130,246,.5); }
    .copy-btn.copied { background:linear-gradient(135deg,var(--success),#06b6d4); }

    /* ── RIGHT COLUMN ── */
    .right-col { display:flex;flex-direction:column;gap:16px; }
    .rates-card { background:var(--card);border:1px solid var(--border);border-radius:22px;padding:24px;backdrop-filter:blur(24px); }
    .rates-title { font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px; }
    .rate-row { display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s; }
    .rate-row:last-child { border-bottom:none; }
    .rate-row:hover { opacity:.75; }
    .rate-row-left { display:flex;align-items:center;gap:10px; }
    .rate-flag { font-size:18px; }
    .rate-code { font-size:13px;font-weight:700;color:var(--text); }
    .rate-name { font-size:10px;color:var(--muted); }
    .rate-right { text-align:right; }
    .rate-value { font-size:14px;font-weight:800;color:var(--text); }
    .rate-change { font-size:10px;font-weight:600;margin-top:2px; }
    .up   { color:var(--success); }
    .down { color:#ef4444; }

    .stats-card { background:var(--card);border:1px solid var(--border);border-radius:22px;padding:24px;backdrop-filter:blur(24px); }
    .stats-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
    .mini-stat { background:rgba(30,41,59,.5);border-radius:14px;padding:14px; }
    .mini-stat-val { font-size:20px;font-weight:800;color:var(--blue);margin-bottom:3px; }
    .mini-stat-label { font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px; }

    @media (max-width:900px) { .main-grid{grid-template-columns:1fr} .right-col{display:grid;grid-template-columns:1fr 1fr;gap:16px} }
    @media (max-width:580px) { .right-col{grid-template-columns:1fr} .panels{grid-template-columns:1fr} .swap-col{flex-direction:row} .swap-btn{transform:rotate(90deg)} .swap-btn:hover{transform:rotate(270deg)} .converter-card{padding:22px 18px} .amount-input,.result-num{font-size:24px} }
  </style>
</head>
<body>

<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="bg-blob blob-3"></div>

<div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>

<div class="page">
  <div class="page-header">
    <h1 class="page-title">Live <span>Currency</span> Exchange</h1>
    <p class="page-sub">Real-time rates · Updated every 60 seconds · 18 currencies</p>
  </div>

  <div class="main-grid">
    <div class="converter-card">
      <div class="card-header">
        <div class="brand">
          <div class="brand-icon">💱</div>
          <span class="brand-name">FX Convert</span>
        </div>
        <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      </div>

      <div class="pairs">
        <button class="pair-btn active" onclick="setQuick('USD','PKR',this)">USD → PKR</button>
        <button class="pair-btn" onclick="setQuick('EUR','USD',this)">EUR → USD</button>
        <button class="pair-btn" onclick="setQuick('GBP','PKR',this)">GBP → PKR</button>
        <button class="pair-btn" onclick="setQuick('AED','PKR',this)">AED → PKR</button>
        <button class="pair-btn" onclick="setQuick('SAR','PKR',this)">SAR → PKR</button>
        <button class="pair-btn" onclick="setQuick('EUR','GBP',this)">EUR → GBP</button>
      </div>

      <div class="panels">
        <div class="panel">
          <div class="panel-label">From</div>
          <div class="currency-row">
            <span class="flag" id="flagFrom">🇺🇸</span>
            <select id="from" onchange="onCurrencyChange()"></select>
          </div>
          <input class="amount-input" id="amount" type="number" value="1" placeholder="0" oninput="scheduleConvert()"/>
        </div>
        <div class="swap-col">
          <button class="swap-btn" onclick="swap()">⇄</button>
        </div>
        <div class="panel">
          <div class="panel-label">To</div>
          <div class="currency-row">
            <span class="flag" id="flagTo">🇵🇰</span>
            <select id="to" onchange="onCurrencyChange()"></select>
          </div>
          <div class="result-num" id="result">—</div>
        </div>
      </div>

      <div class="rate-info">
        <div class="rate-main" id="rateText">Enter an amount to convert</div>
        <div class="rate-badge" id="rateBadge">Frankfurter API</div>
      </div>

      <button class="copy-btn" id="copyBtn" onclick="copyResult()">Copy Result</button>
    </div>

    <div class="right-col">
      <div class="rates-card">
        <div class="rates-title">Live Rates vs USD</div>
        <div id="ratesList"></div>
      </div>
      <div class="stats-card">
        <div class="rates-title">Session Stats</div>
        <div class="stats-grid">
          <div class="mini-stat"><div class="mini-stat-val" id="statConversions">0</div><div class="mini-stat-label">Conversions</div></div>
          <div class="mini-stat"><div class="mini-stat-val" id="statCurrencies">18</div><div class="mini-stat-label">Currencies</div></div>
          <div class="mini-stat"><div class="mini-stat-val" id="statUpdated">—</div><div class="mini-stat-label">Last Updated</div></div>
          <div class="mini-stat"><div class="mini-stat-val" style="color:var(--success)">Live</div><div class="mini-stat-label">Status</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const CURRENCIES = [
    {code:'USD',flag:'🇺🇸',name:'US Dollar'},{code:'EUR',flag:'🇪🇺',name:'Euro'},
    {code:'GBP',flag:'🇬🇧',name:'Brit. Pound'},{code:'PKR',flag:'🇵🇰',name:'Pakistani Rupee'},
    {code:'AED',flag:'🇦🇪',name:'UAE Dirham'},{code:'SAR',flag:'🇸🇦',name:'Saudi Riyal'},
    {code:'CAD',flag:'🇨🇦',name:'Canadian Dollar'},{code:'AUD',flag:'🇦🇺',name:'Aus. Dollar'},
    {code:'JPY',flag:'🇯🇵',name:'Japanese Yen'},{code:'CHF',flag:'🇨🇭',name:'Swiss Franc'},
    {code:'INR',flag:'🇮🇳',name:'Indian Rupee'},{code:'CNY',flag:'🇨🇳',name:'Chinese Yuan'},
    {code:'SGD',flag:'🇸🇬',name:'Singapore Dollar'},{code:'MYR',flag:'🇲🇾',name:'Malaysian Ringgit'},
    {code:'TRY',flag:'🇹🇷',name:'Turkish Lira'},{code:'KWD',flag:'🇰🇼',name:'Kuwaiti Dinar'},
    {code:'QAR',flag:'🇶🇦',name:'Qatari Riyal'},{code:'BHD',flag:'🇧🇭',name:'Bahraini Dinar'},
  ];
  const FLAGS = Object.fromEntries(CURRENCIES.map(c=>[c.code,c.flag]));
  const NAMES = Object.fromEntries(CURRENCIES.map(c=>[c.code,c.name]));
  const FALLBACK = {USD:1,EUR:.92,GBP:.79,PKR:278,AED:3.67,SAR:3.75,CAD:1.37,AUD:1.54,JPY:149,CHF:.89,INR:83.2,CNY:7.27,SGD:1.35,MYR:4.71,TRY:32.1,KWD:.31,QAR:3.64,BHD:.38};
  const CHANGES  = {USD:0,EUR:-.12,GBP:.23,PKR:-.54,AED:.01,SAR:0,CAD:.15,AUD:-.08,JPY:.41,CHF:-.19,INR:-.22,CNY:.07,SGD:.11,MYR:-.3,TRY:-1.2,KWD:.04,QAR:.01,BHD:.02};

  const fromSel = document.getElementById('from');
  const toSel   = document.getElementById('to');
  let conversions = 0, cachedRates = null, usingFallback = false;

  CURRENCIES.forEach(({code})=>{
    fromSel.innerHTML += `<option value="${code}"${code==='USD'?' selected':''}>${code}</option>`;
    toSel.innerHTML   += `<option value="${code}"${code==='PKR'?' selected':''}>${code}</option>`;
  });

  function buildTicker(rates){
    const pairs=[['EUR','USD'],['GBP','USD'],['USD','PKR'],['USD','JPY'],['AED','PKR'],['SAR','PKR'],['USD','INR'],['EUR','GBP'],['USD','CAD'],['USD','CHF'],['USD','CNY'],['KWD','USD']];
    const items=pairs.map(([a,b])=>{
      const rate=rates?(rates[b]/(a==='USD'?1:rates[a])):(FALLBACK[b]/(a==='USD'?1:FALLBACK[a]));
      const chg=(CHANGES[b]||0)-(CHANGES[a]||0);
      return `<span class="ticker-item"><span class="ticker-pair">${FLAGS[a]}${a}/${b}${FLAGS[b]}</span><span class="ticker-rate">${rate.toFixed(2)}</span><span class="${chg>=0?'ticker-up':'ticker-down'}">${chg>=0?'▲':'▼'}${Math.abs(chg).toFixed(2)}%</span></span>`;
    }).join('');
    document.getElementById('tickerTrack').innerHTML=items+items;
  }

  function buildRatesPanel(rates){
    const show=['EUR','GBP','PKR','AED','SAR','JPY','INR','CAD'];
    document.getElementById('ratesList').innerHTML=show.map(code=>{
      const r=rates?rates[code]:FALLBACK[code], chg=CHANGES[code]||0;
      return `<div class="rate-row" onclick="setQuick('USD','${code}',null)">
        <div class="rate-row-left"><span class="rate-flag">${FLAGS[code]}</span><div><div class="rate-code">${code}</div><div class="rate-name">${NAMES[code]}</div></div></div>
        <div class="rate-right"><div class="rate-value">${r.toLocaleString('en-US',{maximumFractionDigits:code==='JPY'?0:4})}</div><div class="rate-change ${chg>=0?'up':'down'}">${chg>=0?'▲':'▼'} ${Math.abs(chg).toFixed(2)}%</div></div>
      </div>`;
    }).join('');
  }

  async function fetchRates(){
    try{
      const res=await fetch('https://api.frankfurter.app/latest?from=USD');
      if(!res.ok) throw new Error();
      const data=await res.json();
      cachedRates={USD:1,...data.rates};
      usingFallback=false;
      document.getElementById('statUpdated').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    } catch{
      if(!cachedRates){ cachedRates={...FALLBACK}; usingFallback=true; }
      document.getElementById('statUpdated').textContent='Fallback';
    }
    buildTicker(cachedRates); buildRatesPanel(cachedRates);
    return cachedRates;
  }

  async function doConvert(){
    const amount=parseFloat(document.getElementById('amount').value);
    const from=fromSel.value, to=toSel.value;
    const resEl=document.getElementById('result');
    if(!amount||amount<=0){resEl.textContent='—'; document.getElementById('rateText').innerHTML='Enter an amount'; return;}
    if(from===to){resEl.textContent=amount.toLocaleString(); document.getElementById('rateText').innerHTML=`<strong>1 ${from} = 1 ${to}</strong>`; return;}
    resEl.classList.add('updating');
    const rates=await fetchRates();
    const rate=from==='USD'?rates[to]:to==='USD'?(1/rates[from]):(rates[to]/rates[from]);
    conversions++;
    document.getElementById('statConversions').textContent=conversions;
    resEl.textContent=(amount*rate).toLocaleString('en-US',{maximumFractionDigits:to==='JPY'?0:2});
    resEl.classList.remove('updating');
    document.getElementById('rateText').innerHTML=`<strong>1 ${from} = ${rate.toLocaleString('en-US',{maximumFractionDigits:4})} ${to}</strong>`;
    document.getElementById('rateBadge').textContent=usingFallback?'Fallback Rates':'Live Rate';
  }

  function updateFlags(){ document.getElementById('flagFrom').textContent=FLAGS[fromSel.value]||'🏳️'; document.getElementById('flagTo').textContent=FLAGS[toSel.value]||'🏳️'; }
  function setQuick(from,to,btn){ fromSel.value=from; toSel.value=to; updateFlags(); scheduleConvert(); document.querySelectorAll('.pair-btn').forEach(b=>b.classList.remove('active')); if(btn)btn.classList.add('active'); }
  function onCurrencyChange(){ updateFlags(); document.querySelectorAll('.pair-btn').forEach(b=>b.classList.remove('active')); scheduleConvert(); }
  function swap(){ [fromSel.value,toSel.value]=[toSel.value,fromSel.value]; updateFlags(); scheduleConvert(); }
  function copyResult(){
    const v=document.getElementById('result').textContent; if(v==='—') return;
    navigator.clipboard.writeText(v);
    const btn=document.getElementById('copyBtn');
    btn.textContent='Copied! ✓'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='Copy Result'; btn.classList.remove('copied'); },2000);
  }

  let timer;
  function scheduleConvert(){ clearTimeout(timer); timer=setTimeout(doConvert,350); }

  updateFlags(); buildTicker(null); buildRatesPanel(null); doConvert();
  setInterval(()=>{ fetchRates().then(()=>doConvert()); },60000);
</script>
</body>
</html>
