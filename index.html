<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Currency Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a4e8c 0%, #2563cc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.22);
    }

    .logo {
      text-align: center;
      font-size: 36px;
      margin-bottom: 6px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 32px;
    }

    h1 span { color: #1a4e8c; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 16px;
      color: #1e293b;
      outline: none;
      transition: border-color 0.2s;
      background: #f8fafc;
    }

    input:focus, select:focus {
      border-color: #1a4e8c;
      background: #fff;
    }

    .form-group { margin-bottom: 20px; }

    .currencies-row {
      display: grid;
      grid-template-columns: 1fr 44px 1fr;
      gap: 10px;
      align-items: end;
      margin-bottom: 20px;
    }

    .swap-btn {
      width: 44px;
      height: 44px;
      background: #eff6ff;
      border: 2px solid #bfdbfe;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      margin-bottom: 0;
      color: #1a4e8c;
    }

    .swap-btn:hover {
      background: #1a4e8c;
      border-color: #1a4e8c;
      color: #fff;
      transform: rotate(180deg);
    }

    .convert-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #1a4e8c, #2563cc);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .convert-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .convert-btn:active { transform: translateY(0); }

    .result {
      margin-top: 24px;
      padding: 22px;
      background: #f0f7ff;
      border: 1px solid #bfdbfe;
      border-radius: 16px;
      text-align: center;
      display: none;
    }

    .result-label { font-size: 12px; color: #64748b; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .result-amount { font-size: 32px; font-weight: 800; color: #1a4e8c; }
    .result-rate { font-size: 13px; color: #94a3b8; margin-top: 6px; }

    .status {
      text-align: center;
      font-size: 13px;
      margin-top: 14px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .status.loading { background: #f1f5f9; color: #64748b; display: block; }
    .status.error   { background: #fef2f2; color: #dc2626; display: block; }

    @media (max-width: 480px) {
      .card { padding: 30px 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">💱</div>
    <h1>Currency <span>Converter</span></h1>

    <div class="form-group">
      <label>Amount</label>
      <input type="number" id="amount" placeholder="Enter amount" value="1" min="0" step="any"/>
    </div>

    <div class="currencies-row">
      <div>
        <label>From</label>
        <select id="from"></select>
      </div>
      <button class="swap-btn" onclick="swap()" title="Swap">⇄</button>
      <div>
        <label>To</label>
        <select id="to"></select>
      </div>
    </div>

    <button class="convert-btn" onclick="convert()">Convert</button>

    <div class="status" id="status"></div>

    <div class="result" id="result">
      <div class="result-label">Converted Amount</div>
      <div class="result-amount" id="resultAmount"></div>
      <div class="result-rate" id="resultRate"></div>
    </div>
  </div>

  <script>
    const CURRENCIES = [
      'USD','EUR','GBP','PKR','AED','SAR','CAD','AUD',
      'JPY','CHF','INR','CNY','SGD','MYR','TRY','KWD','QAR','BHD'
    ];

    const fromSel = document.getElementById('from');
    const toSel   = document.getElementById('to');

    CURRENCIES.forEach(c => {
      fromSel.innerHTML += `<option value="${c}" ${c === 'USD' ? 'selected' : ''}>${c}</option>`;
      toSel.innerHTML   += `<option value="${c}" ${c === 'PKR' ? 'selected' : ''}>${c}</option>`;
    });

    function setStatus(type, msg) {
      const el = document.getElementById('status');
      el.className = `status ${type}`;
      el.textContent = msg;
      if (!type) el.style.display = 'none';
    }

    async function convert() {
      const amount = parseFloat(document.getElementById('amount').value);
      const from   = fromSel.value;
      const to     = toSel.value;

      if (!amount || amount <= 0) { setStatus('error', 'Please enter a valid amount.'); return; }
      if (from === to) {
        document.getElementById('resultAmount').textContent = `${amount.toFixed(2)} ${to}`;
        document.getElementById('resultRate').textContent   = `1 ${from} = 1 ${to}`;
        document.getElementById('result').style.display = 'block';
        setStatus('', '');
        return;
      }

      document.getElementById('result').style.display = 'none';
      setStatus('loading', 'Fetching latest rates…');

      try {
        const res  = await fetch(`https://api.frankfurter.app/latest?from=${from}&to=${to}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        const rate = data.rates[to];
        const converted = (amount * rate).toFixed(4);

        document.getElementById('resultAmount').textContent = `${Number(converted).toLocaleString()} ${to}`;
        document.getElementById('resultRate').textContent   = `1 ${from} = ${rate} ${to}`;
        document.getElementById('result').style.display = 'block';
        setStatus('', '');
      } catch {
        setStatus('error', 'Failed to fetch rates. Please check your connection.');
      }
    }

    function swap() {
      const tmp  = fromSel.value;
      fromSel.value = toSel.value;
      toSel.value   = tmp;
    }

    document.getElementById('amount').addEventListener('keydown', e => {
      if (e.key === 'Enter') convert();
    });
  </script>
</body>
</html>
